# Fly.io config for the SSH-served terminal site.
# Visitors connect over raw TCP on port 22 -> the app listens on 2222 inside.
app = "omer-sshsite"
primary_region = "ord"

[build]

# Raw TCP service (NOT http_service): SSH is a plain TCP protocol, so Fly must
# pass the connection straight through without HTTP/TLS handling.
[[services]]
  internal_port = 2222
  protocol = "tcp"
  # Keep the machine always on — there's no HTTP health probe to wake a stopped
  # machine on a raw TCP connect, so a cold start would just drop the ssh.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # Expose the public side on port 22 so people can just `ssh <ip>` (no -p).
  [[services.ports]]
    port = 22

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
